services:
  db:
    image: postgres:15.2
    restart: always
    container_name: postgres-go
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "db1", "-U", "postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    logging:
      driver: "json-file"
      options:
        max-size: "500m"

volumes:
  db_data:
    external: true
